name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Primary job: typecheck + lint + tests + build under Node (pinned via
  # .tool-versions).
  # ────────────────────────────────────────────────────────────────────────
  node:
    name: node (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # asdf reads .tool-versions at the repo root and provisions the exact
      # Node.js version declared there. We deliberately do NOT use
      # actions/setup-node with a separate version pin — the contract is that
      # .tool-versions is the single source of truth for every environment
      # (local + CI). See CONTRIBUTING.md and docs/milestones.md M0.
      - name: Install asdf and read .tool-versions
        uses: asdf-vm/actions/install@v3

      - name: Print Node.js version
        run: node --version

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────
  # Bun cross-runtime job: runs the same vitest suite under Bun's Node-
  # compatible runtime. The test code is identical; Bun just executes it
  # instead of Node. Catches accidental Node-specific API reliance in
  # test helpers or src/.
  # ────────────────────────────────────────────────────────────────────────
  bun:
    name: bun (vitest suite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (via Bun)
        run: bun install --frozen-lockfile

      - name: Run vitest under Bun
        run: bunx vitest run

  # ────────────────────────────────────────────────────────────────────────
  # Deno cross-runtime job: loads the compiled ESM bundle via Deno's
  # module loader and runs a handful of public-API assertions through
  # scripts/deno-smoke.ts. Catches accidental reliance on Node-only
  # module-resolution or imports.
  # ────────────────────────────────────────────────────────────────────────
  deno:
    name: deno (ESM smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install asdf and read .tool-versions
        uses: asdf-vm/actions/install@v3

      - name: Install dependencies
        run: npm ci

      - name: Build ESM bundle
        run: npm run build

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno smoke
        run: deno run --allow-read scripts/deno-smoke.ts
